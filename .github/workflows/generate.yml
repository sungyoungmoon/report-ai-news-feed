name: Generate Gemini News Sections

on:
  push:
    branches: [main]
    paths:
      - request.json
  schedule:
    - cron: '0 15 * * *'  # Every day at 8 AM PDT (UTC-7)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install google-genai

      - name: Generate sections
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_news.py

      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add result.json
          git diff --staged --quiet || git commit -m "result: gemini sections"
          git pull --rebase
          git push
